<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE8YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    
    <div class="container-fluid mt-4">
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="aluno-tab" data-bs-toggle="tab" data-bs-target="#aluno" type="button" role="tab" aria-controls="aluno" aria-selected="true">Aluno</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="professor-tab" data-bs-toggle="tab" data-bs-target="#professor" type="button" role="tab" aria-controls="professor" aria-selected="false">Professor</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="curso-tab" data-bs-toggle="tab" data-bs-target="#curso" type="button" role="tab" aria-controls="curso" aria-selected="false">Curso</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="componente-tab" data-bs-toggle="tab" data-bs-target="#componente" type="button" role="tab" aria-controls="componente" aria-selected="false">Componente</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="administrador-tab" data-bs-toggle="tab" data-bs-target="#administrador" type="button" role="tab" aria-controls="administrador" aria-selected="false">Administrador</button>
            </li>
        </ul>

        <div class="tab-content mt-4" id="myTabContent">
            <!-- Aluno -->
            <div class="tab-pane fade show active" id="aluno" role="tabpanel" aria-labelledby="aluno-tab">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card shadow">
                            <div class="card-body">
                                <div class="form-group mb-3">
                                    <label for="aluno-nome" class="form-label">Nome</label>
                                    <input type="text" class="form-control" id="aluno-nome" name="nome" required>
                                </div>
                                <button class="btn btn-primary" id="btn-cadastrar-aluno">Cadastrar Aluno</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Professor -->
            <div class="tab-pane fade" id="professor" role="tabpanel" aria-labelledby="professor-tab">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card shadow">
                            <div class="card-body">
                                <div class="form-group mb-3">
                                    <label for="professor-nome" class="form-label">Nome</label>
                                    <input type="text" class="form-control" id="professor-nome" name="nome" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="professor-email" class="form-label">E-mail</label>
                                    <input type="email" class="form-control" id="professor-email" name="email" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="professor-telefone" class="form-label">Telefone</label>
                                    <input type="text" class="form-control" id="professor-telefone" name="telefone" required>
                                </div>
                                <button class="btn btn-primary" id="btn-cadastrar-professor">Cadastrar Professor</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Curso -->
            <div class="tab-pane fade" id="curso" role="tabpanel" aria-labelledby="curso-tab">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card shadow">
                            <div class="card-body">
                                <div class="form-group mb-3">
                                    <label for="curso-nome" class="form-label">Nome</label>
                                    <input type="text" class="form-control" id="curso-nome" name="nome" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="curso-periodo" class="form-label">Período</label>
                                    <select class="form-select" id="curso-periodo" name="periodo" required>
                                        <option value="">Selecione</option>
                                        <option value="Matutino">Matutino</option>
                                        <option value="Vespertino">Vespertino</option>
                                        <option value="Noturno">Noturno</option>
                                        <option value="Integral">Integral</option>
                                    </select>
                                </div>
                                <button class="btn btn-primary" id="btn-cadastrar-curso">Cadastrar Curso</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Componente -->
            <div class="tab-pane fade" id="componente" role="tabpanel" aria-labelledby="componente-tab">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card shadow">
                            <div class="card-body">
                                <div class="form-group mb-3">
                                    <label for="componente-nome" class="form-label">Nome</label>
                                    <input type="text" class="form-control" id="componente-nome" name="nome" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="componente-hora-inicio" class="form-label">Hora de Início</label>
                                    <input type="datetime-local" class="form-control" id="componente-hora-inicio" name="hora_inicio" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="componente-hora-fim" class="form-label">Hora de Fim</label>
                                    <input type="datetime-local" class="form-control" id="componente-hora-fim" name="hora_fim" required>
                                </div>
                                <button class="btn btn-primary" id="btn-cadastrar-componente">Cadastrar Componente</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Administrador -->
            <div class="tab-pane fade" id="administrador" role="tabpanel" aria-labelledby="administrador-tab">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card shadow">
                            <div class="card-body">
                                <div class="form-group mb-3">
                                    <label for="admin-nome" class="form-label">Nome</label>
                                    <input type="text" class="form-control" id="admin-nome" name="nome" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="admin-email" class="form-label">E-mail</label>
                                    <input type="email" class="form-control" id="admin-email" name="email" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="admin-telefone" class="form-label">Telefone</label>
                                    <input type="text" class="form-control" id="admin-telefone" name="telefone" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="admin-cpf" class="form-label">CPF</label>
                                    <input type="text" class="form-control" id="admin-cpf" name="cpf" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="admin-usuario" class="form-label">Usuário</label>
                                    <input type="text" class="form-control" id="admin-usuario" name="usuario" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="admin-senha" class="form-label">Senha</label>
                                    <input type="password" class="form-control" id="admin-senha" name="senha" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label for="admin-status" class="form-label">Status</label>
                                    <select class="form-select" id="admin-status" name="status" required>
                                        <option value="">Selecione</option>
                                        <option value="ativo">Ativo</option>
                                        <option value="inativo">Inativo</option>
                                    </select>
                                </div>
                                <button class="btn btn-primary" id="btn-cadastrar-administrador">Cadastrar Administrador</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        // Função auxiliar para converter datetime-local para Y-m-d H:i:s
        function formatDateTimeLocal(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // Função genérica para cadastro
        function cadastrar(url, dados, nomeEntidade) {
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dados)
            })
            .then(response => response.json())
            .then(data => {
                if (data.errors) {
                    console.log('Erros de validação:', data.errors);
                    alert('Erro de validação. Olhe o console para detalhes.');
                } else {
                    console.log(`${nomeEntidade} cadastrado com sucesso:`, data);
                    alert(`${nomeEntidade} cadastrado com sucesso!`);
                }
            })
            .catch(errors => {
                console.log(`Erro ao cadastrar ${nomeEntidade.toLowerCase()}:`, errors);
                alert(`Erro ao cadastrar ${nomeEntidade.toLowerCase()}. Olhe o console para detalhes.`);
            });
        }

        // Aluno
        document.getElementById('btn-cadastrar-aluno').addEventListener('click', function() {
            const dados = {
                nome: document.getElementById('aluno-nome').value
            };
            cadastrar('http://127.0.0.1:8000/api/aluno/add', dados, 'Aluno');
        });

        // Professor
        document.getElementById('btn-cadastrar-professor').addEventListener('click', function() {
            const dados = {
                nome: document.getElementById('professor-nome').value,
                email: document.getElementById('professor-email').value,
                telefone: document.getElementById('professor-telefone').value
            };
            cadastrar('http://127.0.0.1:8000/api/professor/add', dados, 'Professor');
        });

        // Curso
        document.getElementById('btn-cadastrar-curso').addEventListener('click', function() {
            const dados = {
                nome: document.getElementById('curso-nome').value,
                periodo: document.getElementById('curso-periodo').value
            };
            cadastrar('http://127.0.0.1:8000/api/curso/add', dados, 'Curso');
        });

        // Componente
        document.getElementById('btn-cadastrar-componente').addEventListener('click', function() {
            const dados = {
                nome: document.getElementById('componente-nome').value,
                hora_inicio: formatDateTimeLocal(document.getElementById('componente-hora-inicio').value),
                hora_fim: formatDateTimeLocal(document.getElementById('componente-hora-fim').value)
            };
            cadastrar('http://127.0.0.1:8000/api/componente/add', dados, 'Componente');
        });

        // Administrador
        document.getElementById('btn-cadastrar-administrador').addEventListener('click', function() {
            const dados = {
                nome: document.getElementById('admin-nome').value,
                email: document.getElementById('admin-email').value,
                telefone: document.getElementById('admin-telefone').value,
                cpf: document.getElementById('admin-cpf').value,
                usuario: document.getElementById('admin-usuario').value,
                senha: document.getElementById('admin-senha').value,
                status: document.getElementById('admin-status').value
            };
            cadastrar('http://127.0.0.1:8000/api/administrador/add', dados, 'Administrador');
        });
    </script>
  </body>
</html>
